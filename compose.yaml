services:
  postgres:
    image: postgres:16
    container_name: alexandria-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-alexandria}
      POSTGRES_USER: ${DB_USERNAME:-alexandria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alexandria}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - alexandria-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  alexandria-pg-data:
